# --- General Settings ---
# Change the prefix key from Ctrl+b to Ctrl+a (closer to Home Row)
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Ensure 256-color support inside tmux (critical for Neovim themes)
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Enable mouse support (clicking, resizing panes, scrolling)
set -g mouse on

# Start window and pane indexing at 1 instead of 0 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Decrease command delay for faster response (stops Vim mode-switch lag)
set -s escape-time 0

# --- Vim Style Split & Navigation ---
# Split panes using | and - (more intuitive)
unbind '"'
unbind %
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes using Vim directions (h, j, k, l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Vim keys in Copy Mode (scrolling through agent logs)
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# --- Quick Reload ---
# Reload config file easily with Prefix + r
bind r source-file ~/.tmux.conf \; display "tmux config reloaded!"


# --- Resize Panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Close Pane ---
bind-key -n C-q confirm-before -p "kill-pane #P? (y/n)" kill-pane

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @catppuccin_flavor 'mocha'

run '~/.tmux/plugins/tpm/tpm'
