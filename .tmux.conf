# --- General Settings ---
# Change the prefix key from Ctrl+b to Ctrl+a (closer to Home Row)
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Ensure 256-color support inside tmux (critical for Neovim themes)
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Enable mouse support (clicking, resizing panes, scrolling)
set -g mouse on

# Pass focus events to applications (lets Neovim detect pane switches)
set -g focus-events on

# Start window and pane indexing at 1 instead of 0 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Decrease command delay for faster response (stops Vim mode-switch lag)
set -s escape-time 0

# Allow Shift+Enter to pass through to applications (e.g. Claude Code newline)
bind-key -n S-Enter send-keys Escape "[13;2u"

# --- Vim Style Split & Navigation ---
# Split panes using | and - (more intuitive)
unbind '"'
unbind %
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# Open the new pane *before* the current one (-b): + to the left, _ above
bind + split-window -h -b -c "#{pane_current_path}"
bind _ split-window -v -b -c "#{pane_current_path}"

# Navigate panes using Vim directions (h, j, k, l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Vim keys in Copy Mode (scrolling through agent logs)
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Send copies to the macOS pasteboard so they share one register with
# Neovim's clipboard=unnamedplus (the + register). Without piping to pbcopy,
# tmux keeps yanks in its own buffer and Neovim never sees them.
set -g set-clipboard on
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Window Naming ---
# Auto-name windows after the pane's current directory (basename) instead of
# the running command — "Config" or "hydra" beats "zsh" or "node". Windows
# renamed by hand keep their name (tmux disables auto-rename per-window).
set -g automatic-rename-format '#{b:pane_current_path}'

# --- Sessions ---
# Create a new session, prompting for its name (tmux has no default key for this)
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Strip the choose-tree clutter down to just names: session name on session
# lines, window name on window lines, pane title on pane lines (programs like
# Claude Code set the pane title to a live status — worth keeping).
bind s choose-tree -Zs -F '#{?pane_format,#{pane_title},#{?window_format,#{window_name},#{session_name}}}'
bind w choose-tree -Zw -F '#{?pane_format,#{pane_title},#{?window_format,#{window_name},#{session_name}}}'

# --- Quick Reload ---
# Reload config file easily with Prefix + r
bind r source-file ~/.tmux.conf \; display "tmux config reloaded!"


# --- Resize Panes ---
set -g repeat-time 1000
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Fullscreen Pane ---
bind m resize-pane -Z

# --- Close Pane ---
bind-key -n C-q confirm-before -p "kill-pane #P? (y/n)" kill-pane

# --- Grab a Pane Into the Current Window ---
# Open the session/window/pane tree and join the selected pane beside the
# current one. '%%' is replaced by the chosen target. The process keeps
# running through the move; send it back out later with 'b' (break-pane).
bind g choose-tree -Z "join-pane -h -s '%%'"

# Pop the current pane back out into its own window.
bind b break-pane

# --- Status Bar Widgets ---
# Show the active pane's current directory in the status bar. The onedark
# theme injects @onedark_widgets into status-right, so this must be set
# before tpm runs (below) for the theme to pick it up.
set -g @onedark_widgets "#{pane_current_path}"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'

# --- Active Pane Indicator ---
# Draw colored arrows along the border pointing at the active pane, on top of
# the border line itself. Set after tpm so the onedark theme doesn't clobber it.
set -g pane-border-indicators both

# The onedark theme dims inactive panes by overriding their default foreground
# (window-style/window-active-style). That only dulls default-colored text —
# syntax highlighting and other explicit colors stay bright, so the cue is
# inconsistent. Drop the dimming and instead give the *active* pane a distinct
# background — a subtle dark blue tinted toward onedark's blue (#61afef). The
# background applies to every cell, so the focused pane stands out regardless
# of how its text is colored. Set after tpm so the theme doesn't clobber it.
set -g window-style        "default"
set -g window-active-style "bg=#283040"

# --- Mode-Aware Active Border ---
# Recolor the active pane's border by the state it's in, so the mode is
# obvious at a glance (palette-matched to onedark). Checked in priority order:
#   copy/view mode (pane_in_mode) → yellow
#   synchronize-panes broadcast   → red  (typing hits every pane — treat as a warning)
#   otherwise (normal)            → green
# Set after tpm so the theme doesn't clobber it.
set -g pane-active-border-style "#{?pane_in_mode,fg=#e5c07b,#{?synchronize-panes,fg=#e06c75,fg=#98c379}}"
